# ============================================================
# application.yml — Spring Boot Application Configuration
# ============================================================
# This file configures how the Spring Boot application behaves.
# Spring Boot reads this file on startup and applies the settings.
#
# WHY YAML INSTEAD OF .properties?
# Both formats work. YAML is more readable for nested config
# and is the standard in modern Spring Boot projects.
# application.properties equivalent: server.port=8080
# application.yml equivalent:
#   server:
#     port: 8080
#
# IMPORTANT: Indentation matters in YAML! Use spaces, not tabs.
# ============================================================

# --- Server Configuration ---
server:
  # Port the application listens on.
  # Access the app at: http://localhost:8080
  port: 8080

# --- Spring Configuration ---
spring:
  application:
    # Name used in logging, metrics, and service discovery
    name: provider-api

# --- SpringDoc / OpenAPI Configuration ---
# These settings control how the API documentation is generated.
# springdoc reads our controller annotations and produces the spec.
springdoc:
  api-docs:
    # Enable the /v3/api-docs endpoint (JSON format)
    enabled: true
    # Path where the OpenAPI spec JSON is served
    # Our AI Agent will fetch this to generate contracts!
    path: /v3/api-docs
  swagger-ui:
    # Enable Swagger UI (interactive API docs)
    enabled: true
    # Path to access Swagger UI in the browser
    path: /swagger-ui.html
    # Show HTTP method (GET/POST/etc.) in the endpoint list
    operations-sorter: method

# --- Logging Configuration ---
logging:
  level:
    # Root logging level (INFO shows startup info, requests, etc.)
    root: INFO
    # Our package — DEBUG level for detailed app logging
    com.contracttest.provider: DEBUG
