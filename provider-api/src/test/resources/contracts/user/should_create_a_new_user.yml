# ============================================================
# Contract 3: should_create_a_new_user.yml
# ============================================================
# This contract says:
#   "When someone sends POST /api/users with a valid JSON body,
#    the Provider MUST respond with status 201
#    and the created user (with an auto-generated ID)."
#
# This proves the Provider correctly accepts and creates users.
# ============================================================

description: "Should create a new user and return 201"
name: "should_create_a_new_user"

request:
  method: POST
  url: /api/users
  headers:
    Content-Type: application/json
  body:
    name: "Dave Wilson"
    email: "dave@example.com"
    role: "USER"

response:
  status: 201
  headers:
    Content-Type: application/json
  body:
    # ID will be auto-generated (we use a matcher to verify it's a number)
    id: 4
    name: "Dave Wilson"
    email: "dave@example.com"
    role: "USER"
  matchers:
    body:
      # The id will be auto-generated, just verify it's a positive number
      - path: $.id
        type: by_regex
        value: "[0-9]+"

