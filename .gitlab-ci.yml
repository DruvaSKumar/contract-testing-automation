# ============================================================
# .gitlab-ci.yml — Contract Testing Automation Pipeline
# ============================================================
# AUTO-GENERATED by AI Agent (ci_config_generator.py)
#
# This pipeline automates contract testing on every push:
#   1. BUILD:  Compile Provider and Consumer APIs
#   2. TEST:   Run contract verification tests
#   3. REPORT: Generate contract coverage report
#   4. DEPLOY: Gated — only deploys if ALL tests pass
#
# Contract test failures BLOCK deployment, preventing
# breaking API changes from reaching production.
#
# To regenerate: cd ai-agent && python main.py ci
# ============================================================


# ---- Global Configuration ----
# The Docker image used for all jobs unless overridden.
# maven:3.9-eclipse-temurin-22 includes both Maven and JDK 22.
# Spring Cloud Contract plugin 4.1.3 requires Java 22+.
image: maven:3.9-eclipse-temurin-22

# Variables available to all jobs
variables:
  # Use batch mode for Maven (less verbose output)
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"


# ---- Pipeline Stages ----
# Jobs in the same stage run in parallel.
# A stage only starts after ALL jobs in the previous stage succeed.
stages:
  - build       # Compile source code
  - test        # Run contract verification tests
  - report      # Generate test & coverage reports
  - deploy      # Deploy (only if all tests pass)


# ---- Cache Configuration ----
# Caches Maven dependencies between pipeline runs so that
# subsequent builds don't re-download everything from Maven Central.
# The cache key is per-branch so branches don't pollute each other.
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository/
    - ai-agent/.venv/


# ============================================================
# JOB: Build Provider API
# ============================================================
# Compiles the Provider (User Service) and verifies it builds.
# This catches compilation errors early before running tests.
# ============================================================
provider-build:
  stage: build
  script:
    - cd provider-api
    - mvn $MAVEN_CLI_OPTS clean compile
  rules:
    - changes:
        - provider-api/**/*
        - .gitlab-ci.yml
      when: always
    - when: manual
      allow_failure: true


# ============================================================
# JOB: Build Consumer API
# ============================================================
# Compiles the Consumer (Order Service) and verifies it builds.
# ============================================================
consumer-build:
  stage: build
  script:
    - cd consumer-api
    - mvn $MAVEN_CLI_OPTS clean compile
  rules:
    - changes:
        - consumer-api/**/*
        - .gitlab-ci.yml
      when: always
    - when: manual
      allow_failure: true


# ============================================================
# JOB: Provider Contract Tests
# ============================================================
# This is the CRITICAL job in the pipeline.
#
# What happens:
#   1. Spring Cloud Contract reads YAML contract files
#   2. Auto-generates JUnit tests from the contracts
#   3. Runs tests against the REAL Provider API (via MockMvc)
#   4. If ALL pass → generates stubs JAR (WireMock mappings)
#   5. If ANY fail → BUILD FAILS → deployment blocked
#
# The stubs JAR is saved as an artifact so the Consumer
# test job can use it without rebuilding the Provider.
# ============================================================
provider-contract-test:
  stage: test
  script:
    - cd provider-api
    - mvn $MAVEN_CLI_OPTS clean install
  artifacts:
    when: always
    paths:
      # Stubs JAR — needed by Consumer tests
      - provider-api/target/*-stubs.jar
      # Test reports — displayed in GitLab merge requests
      - provider-api/target/surefire-reports/
    reports:
      junit:
        - provider-api/target/surefire-reports/TEST-*.xml
    expire_in: 7 days


# ============================================================
# JOB: Consumer Contract Tests
# ============================================================
# Tests the Consumer (Order Service) against Provider stubs.
#
# What happens:
#   1. Provider is built locally (tests skipped — already passed)
#      to install the stubs JAR into the local Maven repository
#   2. Stub Runner loads the Provider's stubs JAR from Maven repo
#   3. Starts a WireMock server with stub responses
#   4. Consumer's UserServiceClient calls WireMock
#   5. Tests verify the Consumer correctly parses responses
#
# This job depends on provider-contract-test to ensure
# Provider contracts pass before Consumer tests run.
# ============================================================
consumer-contract-test:
  stage: test
  needs:
    - job: provider-contract-test
  script:
    # Build Provider and install stubs JAR to local Maven repo
    # Tests are skipped because they already passed in provider-contract-test
    - cd provider-api
    - mvn $MAVEN_CLI_OPTS clean install -DskipTests
    # Symlink default Maven repo to project-local repo so the stub runner
    # (which runs in a forked JVM without MAVEN_OPTS) can find the stubs
    - mkdir -p /root/.m2 && ln -sfn $CI_PROJECT_DIR/.m2/repository /root/.m2/repository
    # Run Consumer contract tests against Provider stubs
    - cd ../consumer-api
    - mvn $MAVEN_CLI_OPTS clean test
  artifacts:
    when: always
    paths:
      - consumer-api/target/surefire-reports/
    reports:
      junit:
        - consumer-api/target/surefire-reports/TEST-*.xml
    expire_in: 7 days


# ============================================================
# JOB: AI Agent — Contract Drift Detection
# ============================================================
# Runs the AI agent to check if contracts are in sync with
# the Provider's OpenAPI specification.
#
# This job:
#   1. Starts the Provider API in the background
#   2. Waits for it to be ready
#   3. Runs the drift detector against the live spec
#   4. Generates a coverage report
#
# Exit codes:
#   0 = All contracts valid (HEALTHY)
#   1 = Warnings found (orphaned contracts)
#   2 = Critical drift detected (blocks pipeline)
# ============================================================
ai-agent-drift-check:
  stage: test
  image: maven:3.9-eclipse-temurin-22
  needs:
    - job: provider-contract-test
      artifacts: true
  before_script:
    # Install Python for the AI agent
    - apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv > /dev/null 2>&1
    - cd ai-agent
    - python3 -m venv .venv
    - . .venv/bin/activate
    - pip install -q -r requirements.txt
  script:
    # Start Provider API in background for OpenAPI spec access
    - cd $CI_PROJECT_DIR/provider-api
    - mvn $MAVEN_CLI_OPTS spring-boot:run &
    - PROVIDER_PID=$!
    # Wait for Provider to be ready (max 60 seconds)
    - |
      for i in $(seq 1 30); do
        if curl -s http://localhost:8080/v3/api-docs > /dev/null 2>&1; then
          echo "Provider is ready!"
          break
        fi
        echo "Waiting for Provider... ($i/30)"
        sleep 2
      done
    # Run drift detection
    - cd $CI_PROJECT_DIR/ai-agent
    - . .venv/bin/activate
    - python3 main.py drift --save-report
    # Cleanup — stop the Provider
    - kill $PROVIDER_PID 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - ai-agent/reports/
    expire_in: 7 days
  allow_failure: true  # Drift warnings don't block, critical drift does (exit code 2)


# ============================================================
# JOB: Contract Test Report
# ============================================================
# Collects and summarizes all contract test results.
# This job ALWAYS runs, even if previous stages failed,
# so you can see what went wrong.
# ============================================================
contract-report:
  stage: report
  when: always
  script:
    - echo "=== CONTRACT TEST REPORT ==="
    - echo ""
    - echo "--- Provider Contract Tests ---"
    - cat provider-api/target/surefire-reports/*.txt 2>/dev/null || echo "No Provider test reports found"
    - echo ""
    - echo "--- Consumer Contract Tests ---"
    - cat consumer-api/target/surefire-reports/*.txt 2>/dev/null || echo "No Consumer test reports found"
    - echo ""
    - echo "--- AI Agent Drift Report ---"
    - cat ai-agent/reports/drift_report.txt 2>/dev/null || echo "No drift report found"
    - echo ""
    - echo "=== END OF REPORT ==="
  dependencies:
    - provider-contract-test
    - consumer-contract-test
    - ai-agent-drift-check


# ============================================================
# JOB: Deploy (Gated by Contract Tests)
# ============================================================
# This job only runs if ALL contract tests passed.
# It represents the deployment gate — no broken contracts
# can reach production.
#
# CUSTOMIZE: Replace the placeholder script with your
# actual deployment commands (Docker build, kubectl apply,
# AWS ECS deploy, etc.)
# ============================================================
deploy:
  stage: deploy
  script:
    - echo "All contract tests passed - safe to deploy!"
    - echo "Deployment placeholder - replace with your deploy commands (docker build, kubectl apply, etc.)"
  rules:
    # Only deploy from the main branch
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    # Manual deploy for other branches
    - when: manual
      allow_failure: true
  dependencies:
    - provider-contract-test
    - consumer-contract-test
