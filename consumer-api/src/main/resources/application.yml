# ============================================================
# application.yml — Consumer API (Order Service) Configuration
# ============================================================
# This configures the Order Service. Notice it runs on port 8081
# and has a configuration for the Provider API's URL.
#
# WHY CONFIGURE THE PROVIDER URL?
# The Order Service needs to CALL the User Service's API.
# Instead of hardcoding the URL in Java code, we put it here.
# This makes it easy to change for different environments:
#   - Local development: http://localhost:8080
#   - Staging: http://user-service-staging:8080
#   - Production: http://user-service-prod:8080
# ============================================================

# --- Server Configuration ---
server:
  # Port 8081 — different from Provider (port 8080) so both
  # can run simultaneously on the same machine.
  port: 8081

# --- Spring Configuration ---
spring:
  application:
    name: consumer-api

# --- Provider API Configuration ---
# Custom property — this is NOT a built-in Spring property.
# We define it ourselves and read it in our code using @Value.
provider:
  api:
    # Base URL of the Provider (User Service) API.
    # Our UserServiceClient reads this to know where to send requests.
    base-url: http://localhost:8080

# --- SpringDoc / OpenAPI Configuration ---
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method

# --- Logging Configuration ---
logging:
  level:
    root: INFO
    com.contracttest.consumer: DEBUG
    # Log HTTP requests made by RestTemplate (useful for debugging
    # the calls our service makes to the Provider API)
    org.springframework.web.client.RestTemplate: DEBUG
